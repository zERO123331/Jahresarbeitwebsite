services:
  ShopDB:
    image: postgres:18.4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      - ./inits/init-db:/docker-entrypoint-initdb.d
      - ShopDBVolume:/var/lib/postgresql
  ShopImageDB:
    image: quay.io/minio/minio:latest
    command: server /mnt/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - backend
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ShopImageDBVolumeData:/mnt/data
      - ShopImageDBVolumeCerts:/etc/minio/certs


  web:
    build:
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5

    networks:
      - backend
      - default
    links:
      - ShopDB
      - ShopImageDB
    ports:
    - 4000:4000
    depends_on:
      ShopDB:
        condition: service_healthy
        restart: true
      ShopImageDB:
        condition: service_healthy
    environment:
      SHOP_DB_DSN: "postgresql://shop:pa55word@ShopDB:5432/shopdb?sslmode=disable"
      SHOP_CDN_ENDPOINT: "localhost:9000"
      SHOP_CDN_ACCESS_KEY: "minioadmin"
      SHOP_CDN_SECRET_KEY: "minioadmin"
      SHOP_CDN_BUCKET: "images"
networks:
  backend:
    driver: bridge
    internal: true
volumes:
  ShopDBVolume:
  ShopImageDBVolumeData:
  ShopImageDBVolumeCerts:

